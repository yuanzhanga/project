<script>
var zeroFilledSubarray = function (nums) {
    let arr = []
    
    let cnt = 0
    for(let i = 0;i<nums.length;i++){
        if(nums[i]===0){
            cnt++
        }else {
            arr.push(cnt)
            cnt = 0
            continue
        }
        if(i === nums.length - 1) {
            arr.push(cnt)
        }
    }
    let res = 0
    for(let i = 0;i<arr.length;i++){
        res+= (arr[i] * (arr[i] + 1)) / 2
    }
    return res
};
    console.log(zeroFilledSubarray([1,3,0,0,2,0,0,4]));
</script>
